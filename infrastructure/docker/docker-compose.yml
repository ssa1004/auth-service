services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  mailhog:
    # 이메일 발송 mock — UI: http://localhost:8025
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  auth:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth
      SPRING_DATASOURCE_USERNAME: auth
      SPRING_DATASOURCE_PASSWORD: auth
      SPRING_DATA_REDIS_URL: redis://redis:6379
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
      # 32 bytes base64 — 로컬 시드. 운영은 절대 commit 하지 말 것.
      AUTH_MFA_AES_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    ports:
      - "8080:8080"
