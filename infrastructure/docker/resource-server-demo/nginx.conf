worker_processes 1;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

# Lua 환경변수 노출 (main context 전용) — jwt_verify.lua 에서 os.getenv 로 접근.
env AUTH_JWT_ISSUER;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    # JWKS / introspection 응답 캐시 (lua-resty-jwt 가 in-memory 로 활용).
    lua_shared_dict jwks_cache 1m;

    # auth-service hostname 해석을 위해 docker DNS 사용.
    resolver 127.0.0.11 ipv6=off valid=30s;

    server {
        listen 8080;
        server_name _;

        # 헬스체크 — JWT 없이 통과.
        location = /health {
            content_by_lua_block {
                ngx.status = 200
                ngx.header["content-type"] = "application/json"
                ngx.say('{"status":"UP"}')
            }
        }

        # 보호 자원 — JWT 검증 통과 시 sub / scope 를 echo.
        location /api/demo {
            # access_by_lua 가 검증 후 채워넣는 nginx variable. 미리 선언해야 set 가능.
            set $jwt_sub "";
            set $jwt_scope "";
            set $jwt_iss "";

            access_by_lua_file conf/jwt_verify.lua;

            content_by_lua_block {
                local cjson = require "cjson"
                ngx.header["content-type"] = "application/json"
                ngx.say(cjson.encode({
                    message = "resource-server-demo: JWT 검증 통과",
                    sub = ngx.var.jwt_sub or "",
                    scope = ngx.var.jwt_scope or "",
                    iss = ngx.var.jwt_iss or ""
                }))
            }
        }
    }
}
