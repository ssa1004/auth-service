# 운영에서는 SealedSecret / Vault / ExternalSecrets 로 관리. 본 파일은 형태 예시.
# 절대 평문 비밀을 commit 에 포함시키지 말 것.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: auth
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "auth"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_AT_DEPLOY_TIME"
  # 32 bytes base64. 절대 commit 하지 말 것.
  AUTH_MFA_AES_KEY: "REPLACE_AT_DEPLOY_TIME"
  AUTH_OAUTH2_DEMO_CLIENT_SECRET: "REPLACE_AT_DEPLOY_TIME"
