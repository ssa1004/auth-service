{{- if .Values.secret.create -}}
# 운영은 본 Secret 을 사용하지 말 것 — SealedSecret / ExternalSecret 으로 대체.
# 본 chart 는 dev / 로컬 검증용 placeholder 만 담습니다.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
