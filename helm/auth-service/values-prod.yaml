# 운영 (prod) override.
# helm upgrade auth-service helm/auth-service \
#   --namespace auth --values helm/auth-service/values-prod.yaml \
#   --set image.tag=<release-sha>

replicaCount: 3

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2000m"
    memory: "2Gi"

# 운영 probe — failureThreshold 더 보수적 (네트워크 swing 흡수).
probes:
  startup:
    path: /actuator/health/readiness
    periodSeconds: 5
    failureThreshold: 60          # 5s * 60 = 300s — 운영 인스턴스의 cold start 여유
    timeoutSeconds: 3
  readiness:
    path: /actuator/health/readiness
    periodSeconds: 10
    failureThreshold: 5
    timeoutSeconds: 3
  liveness:
    path: /actuator/health/liveness
    periodSeconds: 30
    failureThreshold: 5
    timeoutSeconds: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: auth.example.com      # 운영 환경별 override 필수
      paths:
        - path: /oauth2
          pathType: Prefix
        - path: /.well-known
          pathType: Prefix
        - path: /api/v1/admin
          pathType: Prefix
        - path: /actuator/health
          pathType: Prefix
  tls:
    - secretName: auth-tls
      hosts:
        - auth.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

# 운영 ConfigMap override — issuer / OPA mode / OpenAPI off.
config:
  AUTH_JWT_ISSUER: "https://auth.example.com"
  AUTH_ACCESS_TOKEN_TTL: "PT15M"
  AUTH_REFRESH_TOKEN_TTL: "P30D"
  AUTH_BCRYPT_COST: "12"
  AUTH_LOGIN_RATE_BURST: "10"
  AUTH_LOGIN_RATE_WINDOW: "PT1M"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://auth-postgres:5432/auth"
  SPRING_DATA_REDIS_URL: "redis://auth-redis:6379"
  SPRING_MAIL_HOST: "smtp.example.com"
  SPRING_MAIL_PORT: "587"
  AUTH_OPENAPI_ENABLED: "false"
  AUTH_OPA_MODE: "sidecar"
  AUTH_OPA_BASE_URL: "http://localhost:8181"
  AUTH_JWK_SOURCE: "kms"

auth:
  jwk:
    source: kms
  opa:
    mode: sidecar

opaSidecar:
  enabled: true

# 운영은 chart 의 평문 Secret 대신 외부 secret 사용.
# SealedSecret / ExternalSecret 등으로 미리 만들어 둔 Secret 이름을 envFrom 으로 참조.
secret:
  create: false
extraEnvFrom:
  - secretRef:
      name: auth-vault-secrets   # KMS / Vault 에서 동기화된 Secret
