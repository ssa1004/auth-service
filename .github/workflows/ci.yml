name: CI

on:
  workflow_dispatch:

jobs:
  # gradle-wrapper.jar 가 공식 배포 체크섬과 일치하는지 검증 — 변조된 wrapper 가
  # 빌드 파이프라인에서 임의 코드를 실행하는 공급망 공격을 차단.
  gradle-wrapper-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  test:
    runs-on: ubuntu-latest
    needs: gradle-wrapper-validation
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run check
        run: ./gradlew --no-daemon check

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: auth-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart (default values)
        run: helm lint helm/auth-service

      - name: Lint chart (prod values)
        run: helm lint helm/auth-service --values helm/auth-service/values-prod.yaml

      - name: Template chart (default values)
        run: helm template helm/auth-service > /dev/null

      - name: Template chart (prod values)
        run: helm template helm/auth-service --values helm/auth-service/values-prod.yaml > /dev/null
