name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 같은 ref 의 이전 in-flight 실행은 취소 — PR 에 연속 push 시 러너 낭비 방지.
# main push 는 ref 가 고유하므로 서로 취소되지 않는다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한 기본값 — 모든 job 은 소스 read 만 필요. 필요 시 job 단위로 상향.
permissions:
  contents: read

jobs:
  # gradle-wrapper.jar 가 공식 배포 체크섬과 일치하는지 검증 — 변조된 wrapper 가
  # 빌드 파이프라인에서 임의 코드를 실행하는 공급망 공격을 차단.
  gradle-wrapper-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

  test:
    runs-on: ubuntu-latest
    needs: gradle-wrapper-validation
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run check + aggregated coverage
        run: ./gradlew --no-daemon check testCodeCoverageReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/

  # OpenAPI spec drift 게이트 — 코드(controller / OpenApiConfig)는 바뀌었는데
  # docs/openapi/auth-service.yaml 을 갱신 안 하면 실패. 외부 인프라 ZERO 의 dev
  # 프로파일(H2 in-memory)로 앱을 부팅해 spec 을 재생성하므로 service container 불필요.
  openapi-spec:
    runs-on: ubuntu-latest
    needs: gradle-wrapper-validation
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # yq 는 ubuntu-latest 러너에 사전 설치되어 있다 (Mike Farah yq v4).
      - name: Regenerate OpenAPI spec (zero-infra dev profile)
        run: ./scripts/gen-openapi.sh

      # 재생성 결과가 commit 된 파일과 다르면 실패 — spec drift 차단.
      - name: Fail on spec drift
        run: git diff --exit-code -- docs/openapi/auth-service.yaml

      # drift 가 있으면 어디가 바뀌었는지 로그로 남긴다.
      - name: Show drift (on failure)
        if: failure()
        run: git --no-pager diff -- docs/openapi/auth-service.yaml

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    # Trivy 스캔 결과(SARIF)를 GitHub Security 탭에 업로드하기 위한 최소 권한 상향.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          # 빌드 이미지를 로컬 daemon 에 적재 — 아래 Trivy image 스캔이 참조한다.
          load: true
          tags: auth-service:ci
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 빌드된 이미지를 실제로 스캔하는 게이트 — fixable HIGH/CRITICAL 이 있으면 빌드 실패.
      # ignore-unfixed: 아직 패치가 없는 취약점은 차단 대상에서 제외(잡음 방지).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: image
          image-ref: auth-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy.sarif

      # Security 탭 적재는 게이트가 아니므로 실패해도 빌드를 막지 않는다(continue-on-error).
      # 스캔 게이트 자체가 exit-code:1 로 실패했어도 SARIF 는 올린다(if: always()).
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy-image

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install kubeconform
        run: |
          KCV=v0.6.7
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KCV}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Lint chart (default values)
        run: helm lint helm/auth-service

      - name: Lint chart (prod values)
        run: helm lint helm/auth-service --values helm/auth-service/values-prod.yaml

      # 렌더 결과를 실제 Kubernetes 스키마로 검증 — lint 가 못 잡는 잘못된 필드 / 타입 차단.
      - name: Validate rendered manifests (default values)
        run: |
          helm template t helm/auth-service \
            | kubeconform -strict -ignore-missing-schemas -summary

      - name: Validate rendered manifests (prod values)
        run: |
          helm template t helm/auth-service --values helm/auth-service/values-prod.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary
