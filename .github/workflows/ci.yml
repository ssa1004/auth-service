name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 같은 ref 의 이전 in-flight 실행은 취소 — PR 에 연속 push 시 러너 낭비 방지.
# main push 는 ref 가 고유하므로 서로 취소되지 않는다.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 최소 권한 기본값 — 모든 job 은 소스 read 만 필요. 필요 시 job 단위로 상향.
permissions:
  contents: read

jobs:
  # gradle-wrapper.jar 가 공식 배포 체크섬과 일치하는지 검증 — 변조된 wrapper 가
  # 빌드 파이프라인에서 임의 코드를 실행하는 공급망 공격을 차단.
  gradle-wrapper-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

  test:
    runs-on: ubuntu-latest
    needs: gradle-wrapper-validation
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run check + aggregated coverage
        run: ./gradlew --no-daemon check testCodeCoverageReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: build/reports/jacoco/testCodeCoverageReport/

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    # Trivy 스캔 결과(SARIF)를 GitHub Security 탭에 업로드하기 위한 최소 권한 상향.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          # 빌드 이미지를 로컬 daemon 에 적재 — 아래 Trivy image 스캔이 참조한다.
          load: true
          tags: auth-service:ci
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 빌드된 이미지를 실제로 스캔하는 게이트 — fixable HIGH/CRITICAL 이 있으면 빌드 실패.
      # ignore-unfixed: 아직 패치가 없는 취약점은 차단 대상에서 제외(잡음 방지).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: auth-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy.sarif

      # Security 탭 적재는 게이트가 아니므로 실패해도 빌드를 막지 않는다(continue-on-error).
      # 스캔 게이트 자체가 exit-code:1 로 실패했어도 SARIF 는 올린다(if: always()).
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy.sarif
          category: trivy-image

  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Install kubeconform
        run: |
          KCV=v0.6.7
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KCV}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Lint chart (default values)
        run: helm lint helm/auth-service

      - name: Lint chart (prod values)
        run: helm lint helm/auth-service --values helm/auth-service/values-prod.yaml

      # 렌더 결과를 실제 Kubernetes 스키마로 검증 — lint 가 못 잡는 잘못된 필드 / 타입 차단.
      - name: Validate rendered manifests (default values)
        run: |
          helm template t helm/auth-service \
            | kubeconform -strict -ignore-missing-schemas -summary

      - name: Validate rendered manifests (prod values)
        run: |
          helm template t helm/auth-service --values helm/auth-service/values-prod.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary
