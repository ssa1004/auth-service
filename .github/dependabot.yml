version: 2
updates:
  # Gradle 의존성 — Spring Boot / Security / Authorization Server / bucket4j 등.
  # 멀티모듈이지만 버전 관리가 루트 build.gradle.kts 한 곳에 모여 있어 directory: "/" 로 충분.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - gradle
    reviewers:
      - ssa1004
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Spring 생태계는 BOM 으로 함께 올라가야 하므로 한 PR 로 묶음.
      spring:
        patterns:
          - "org.springframework*"
          - "io.spring.dependency-management"

  # GitHub Actions — ci.yml / codeql.yml 의 actions 핀 버전.
  # SHA 로 핀되어 있어도 dependabot 은 주석의 태그를 읽어 최신 SHA 로 갱신한다.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    reviewers:
      - ssa1004
    commit-message:
      prefix: "ci"

  # Docker — Dockerfile 의 digest-pin 된 베이스 이미지 (eclipse-temurin).
  # 베이스 OS / JRE 의 보안 패치를 digest 갱신으로 반영.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    reviewers:
      - ssa1004
    commit-message:
      prefix: "build(deps)"
