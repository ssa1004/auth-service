spring:
  jpa:
    hibernate:
      # 테스트는 H2 in-memory — Flyway 가 PostgreSQL dialect 라 ddl-auto 는 update.
      ddl-auto: update
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      # 테스트는 leak detection 끔 — junit 의 @Transactional rollback 이 connection 을
      # 길게 쥐는 패턴이 있어 noise 만 발생.
      leak-detection-threshold: 0
      maximum-pool-size: 4
      minimum-idle: 1
      connection-timeout: 5000
  mail:
    host: localhost
    port: 25
auth:
  mfa:
    # 테스트 전용 시드. 실제 비밀 아님.
    aes-key-base64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  jwk:
    # 테스트 — local-jwk.json 을 working dir 에 만들지 않도록 tmp 로 격리.
    # build/test 는 매 빌드마다 비워지므로 부팅마다 새 키.
    local-path: build/test/local-jwk.json
