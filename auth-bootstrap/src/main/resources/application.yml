spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: auth
    password: auth
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: redis://localhost:6379
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# auth.* — AuthPropertiesBinding 으로 주입.
# 운영에서는 mfa.aes-key-base64 를 환경변수로 외부 주입 (yaml 평문 금지).
auth:
  access-token-ttl: PT15M
  refresh-token-ttl: P30D
  refresh-reuse-grace-period: PT5S
  bcrypt-cost: 12
  login-rate-burst: 10
  login-rate-window: PT1M
  jwt-issuer: http://localhost:8080
  mfa-issuer: auth-service
  mail:
    from: no-reply@auth.example.com
  mfa:
    # 32 bytes base64 — 운영은 KMS / Vault. 로컬 개발용 placeholder.
    aes-key-base64: ${AUTH_MFA_AES_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.example.auth: DEBUG
