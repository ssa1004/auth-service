spring:
  application:
    name: auth-service
  lifecycle:
    # 기다리는 최대 시간. K8s terminationGracePeriodSeconds (30s) 보다 짧게 — 그래야
    # K8s 가 SIGKILL 보내기 전에 Spring 이 알아서 정리 끝냄.
    timeout-per-shutdown-phase: 25s
  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: auth
    password: auth
    hikari:
      # ADR-0009 — 풀 사이즈 산정.
      # auth-service 는 인증 (CPU + 짧은 DB I/O) 위주 워크로드. 한 인스턴스 4 vCPU 가정.
      # Hikari 권장 공식: pool = (core_count * 2) + effective_spindle_count (1).
      # → 4*2+1 = 9. 단, JWK 회전 / audit append / refresh rotation 동시 실행 +
      # connection 회수 지연 여유로 18 잡음 (= 권장 하한의 2배).
      # PostgreSQL `max_connections=100` 인스턴스 가정 — 인스턴스 5대 * 18 = 90 < 100,
      # 운영자가 더 띄우면 PgBouncer 연결 풀러 도입을 검토.
      maximum-pool-size: 18
      # idle 4 — 야간 / 트래픽 저점에도 cold start 방지용. timeout 30분 안에 새 연결 만들기보다
      # 살려두는 게 latency 일관성에 유리.
      minimum-idle: 4
      # connection-timeout 3s — 풀이 마르면 빠르게 fail-fast. 30s 면 클라이언트 timeout 보다
      # 훨씬 늦어 cascade 장애 유발.
      connection-timeout: 3000
      # max-lifetime 29분 — RDS / GCP CloudSQL 의 idle TCP timeout (30분) 보다 1분 짧게.
      # 그래야 Hikari 가 먼저 끊고 새 연결을 만들어 "stale connection" 예외 회피.
      max-lifetime: 1740000
      # idle-timeout — minimum-idle 보다 많은 연결을 회수하기까지 시간. max-lifetime 보다 짧게.
      idle-timeout: 600000
      # leak-detection-threshold 30s — 30초 이상 연결 잡고 있으면 stack trace 로 경고.
      # 운영에서 누가 connection.close() 빠뜨리는지 즉시 확인 가능. prod=on, test=off.
      leak-detection-threshold: 30000
      # 풀 이름 — Prometheus / Grafana 에서 식별 용이.
      pool-name: AuthHikariPool
      # validation 은 JDBC 4 isValid() 위임 — `connection-test-query` 명시 안 함이 권장.
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: redis://localhost:6379
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080
  forward-headers-strategy: framework
  # ADR-0011 — graceful shutdown.
  # SIGTERM 수신 시 새 요청은 받지 않고 in-flight 요청은 끝날 때까지 기다림.
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      # liveness / readiness state indicator 활성 (ADR-0010).
      group:
        readiness:
          # readiness=DOWN 이면 K8s 가 트래픽 차단. Postgres / Redis 의존을 포함.
          include: readinessState,db,redis
        liveness:
          # liveness 는 프로세스가 살아있는지만 봅니다. DB down 으로 살아있는 pod 까지
          # 죽이면 장애가 더 커질 수 있어 외부 의존은 일부러 빼는 것이 권장 패턴.
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# auth.* — AuthPropertiesBinding 으로 주입.
# 운영에서는 mfa.aes-key-base64 를 환경변수로 외부 주입 (yaml 평문 금지).
auth:
  access-token-ttl: PT15M
  refresh-token-ttl: P30D
  refresh-reuse-grace-period: PT5S
  bcrypt-cost: 12
  login-rate-burst: 10
  login-rate-window: PT1M
  jwt-issuer: http://localhost:8080
  mfa-issuer: auth-service
  mail:
    from: no-reply@auth.example.com
  mfa:
    # 32 bytes base64 — 운영은 KMS / Vault. 로컬 개발용 placeholder.
    aes-key-base64: ${AUTH_MFA_AES_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  audit:
    # SIEM outbox worker 폴링 주기 (ms). 너무 짧으면 DB 부담, 너무 길면 SIEM 도달 지연.
    outbox-poll-interval: 2000
  jwk:
    # 'local' — LocalFileKeyMaterialSource (디스크 파일, dev/local).
    # 'kms'   — KmsKeyMaterialSource (운영, 본 시점은 placeholder — README wiring 가이드).
    source: ${AUTH_JWK_SOURCE:local}
    # local 백엔드의 파일 경로. 운영에서는 디스크 휘발 + pod 간 키 불일치 위험으로 절대 사용 금지.
    local-path: ${AUTH_JWK_LOCAL_PATH:./local-jwk.json}
  oidc:
    # Google OIDC 매핑 시 사용자 도메인의 tenantSlug. multi-tenant 본격화 후 redirect URI 에 포함.
    default-tenant-slug: ${AUTH_OIDC_DEFAULT_TENANT:default}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.example.auth: DEBUG
